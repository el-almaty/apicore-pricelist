name: Update apicore price list

on:
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price list script
        env:
          APICORE_API_KEY: ${{ secrets.APICORE_API_KEY }}
          APICORE_DISTRIBUTORS: ${{ secrets.APICORE_DISTRIBUTORS }}
          APICORE_CATALOG_CODE: ${{ secrets.APICORE_CATALOG_CODE }}
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
          BITRIX_FOLDER_ID: ${{ secrets.BITRIX_FOLDER_ID }}
        run: python apicore_pricelist.py
